name: AI cost spike emergency sprint
description: Buy a USD $1,000 emergency sprint for a runaway AI agent, RAG, coding-agent, support bot, or model API cost spike
title: "AI cost spike emergency: <project name>"
labels: ["audit-intent", "ai-cost-spike-emergency"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for the USD $1,000 AI Cost Spike Emergency Sprint. Do not paste secrets, private prompts, API keys, customer data, proprietary logs, production traces with sensitive values, or billing screenshots with private account details.
  - type: dropdown
    id: package
    attributes:
      label: Requested package
      description: This form is for one emergency cost containment sprint.
      options:
        - USD $1,000 AI Cost Spike Emergency Sprint
    validations:
      required: true
  - type: input
    id: project
    attributes:
      label: Project, repo, product, or workflow URL
      description: Public repo, docs, demo, TokenMeter snapshot, sanitized trace summary, or product URL.
      placeholder: https://github.com/org/repo
    validations:
      required: true
  - type: dropdown
    id: cost-spike
    attributes:
      label: Cost spike type
      description: Pick the closest driver for the emergency sprint.
      options:
        - Runaway coding agent or repeated tool calls
        - RAG over-retrieval or context bloat
        - Support bot or chat workflow bill spike
        - Model routing or frontier model overuse
        - Retry storm or failed tool-call loop
        - Cache miss or prompt churn
        - Batch/background job LLM spend spike
        - Launch pricing/free-tier risk
        - Other AI cost spike
    validations:
      required: true
  - type: textarea
    id: sanitized-evidence
    attributes:
      label: Sanitized cost evidence
      description: Summarize request counts, model mix, token totals, monthly/daily spend change, retry counts, prompt/context size, or billing shape. Keep it sanitized.
      placeholder: Spend moved from $200/day to $900/day after agent launch; 8k runs/day, 4-12 tool calls/run, long RAG context, repeated retries; no private prompts or account data included.
    validations:
      required: true
  - type: textarea
    id: emergency-decision
    attributes:
      label: Emergency decision
      description: What decision should the sprint help you make first?
      placeholder: Which caps, model routes, cache changes, retrieval limits, or kill switches can stop the bill spike this week?
    validations:
      required: true
  - type: input
    id: deadline
    attributes:
      label: Deadline or billing risk window
      description: When does this need a containment plan?
      placeholder: Within 24h; before launch on Friday; before next billing cycle
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email, GitHub handle, or "reply in this issue".
      placeholder: reply in this issue
    validations:
      required: true
  - type: dropdown
    id: payment
    attributes:
      label: Payment path
      description: Choose network and asset if ready, or invoice/discussion first if billing details need to be agreed before payment.
      options:
        - Ethereum ETH after scope acceptance
        - Ethereum ERC-20 USDC/USDT/DAI after scope acceptance
        - Solana SOL after scope acceptance
        - Solana SPL USDC after scope acceptance
        - Need invoice/discussion first
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I will not include secrets, private prompts, API keys, customer data, proprietary logs, production traces with sensitive values, or billing account details in this issue.
          required: true
        - label: I understand payment is only requested after written scope acceptance for the selected USD $1,000 emergency package.
          required: true
