name: Goal Status Monitor

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check goal status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOAL_ATTENTION_FAIL: "false"
          GOAL_USD_TARGET: "1000"
          GOAL_ATTENTION_THRESHOLD_USD: "900"
          GOAL_REVENUE_PACKAGE_ATTENTION_USD: "79"
        run: node scripts/check-goal-status.mjs
