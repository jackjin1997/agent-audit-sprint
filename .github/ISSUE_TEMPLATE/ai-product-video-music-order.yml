name: Buy AI product video music
description: Short buying-intent form for ecommerce product video music hooks
title: "AI product video music order: <product or store name>"
labels: ["ai-jingle-order", "ai-product-video-music-order"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a paid AI-assisted product video music hook sketch or ecommerce ad music pack. Do not paste private customer data, credentials, unreleased sensitive product data, or third-party lyrics you do not have rights to use.
  - type: dropdown
    id: package
    attributes:
      label: Requested package
      description: Pick the smallest package that answers the current product-video need.
      options:
        - USD $29 Product Video Music Hook Sketch
        - USD $79 Jingle Hook Pack
        - USD $149 Ecommerce Ad Music Pack
        - USD $399 Sonic Launch Kit
    validations:
      required: true
  - type: input
    id: product
    attributes:
      label: Product or store name
      placeholder: BrightBottle Launch
    validations:
      required: true
  - type: dropdown
    id: reference_sample
    attributes:
      label: Reference sample or direction
      description: Pick the closest public reference or write details in the offer field below.
      options:
        - Product Demo Hook sample
        - Coffee Shop 30s Hook sample
        - Business Show Intro sample
        - Radio ID And Drop sample
        - Custom direction described below
    validations:
      required: true
  - type: input
    id: website
    attributes:
      label: Store, product page, or creative brief link
      placeholder: https://example.com/products/bottle
  - type: dropdown
    id: usage
    attributes:
      label: Primary use
      options:
        - Shopify product page video
        - TikTok Shop ad opener
        - Meta ad creative
        - Amazon listing video
        - Product launch reel
        - Marketplace listing video
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Publishing channel
      options:
        - Shopify product page
        - TikTok Shop paid ad
        - Instagram Reels paid ad
        - YouTube Shorts paid ad
        - Amazon or marketplace listing video
        - Multi-platform ecommerce campaign
    validations:
      required: true
  - type: dropdown
    id: source_rights
    attributes:
      label: Source material rights
      options:
        - Original prompt only; no third-party lyrics or melodies
        - Brand-owned tagline only
        - Cleared product video or voiceover reference
        - Needs rights review before generation
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Product offer and target buyer
      description: Summarize the product, buyer, offer, and video context without private customer data.
      placeholder: Hydration bottle buyers watching a fast product demo and launch-week bundle offer.
    validations:
      required: true
  - type: input
    id: cta
    attributes:
      label: Required CTA or product claim
      placeholder: Hydrate smarter before the next refill.
  - type: dropdown
    id: pacing
    attributes:
      label: Visual pacing
      options:
        - Product demo
        - Before-after
        - Unboxing
        - Testimonial
        - Launch reel
        - Listing video
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email, GitHub handle, or "reply in this issue".
      placeholder: reply in this issue
    validations:
      required: true
  - type: dropdown
    id: timing
    attributes:
      label: Timing
      options:
        - 24h if available
        - 48h target
        - This week
        - Date to discuss
    validations:
      required: true
  - type: dropdown
    id: payment
    attributes:
      label: Payment path
      description: Payment is requested only after the brief is accepted in writing.
      options:
        - Ethereum ETH after brief acceptance
        - Ethereum ERC-20 USDC/USDT/DAI after brief acceptance
        - Solana SOL after brief acceptance
        - Solana SPL USDC after brief acceptance
        - Need invoice/discussion first
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I will not include secrets, credentials, private customer data, unreleased sensitive product data, or third-party lyrics I do not have rights to use.
          required: true
        - label: I understand AI-generated music may have copyright-registration limits, and this package is not legal clearance.
          required: true
        - label: I understand payment is only requested after written brief acceptance for the selected package.
          required: true
