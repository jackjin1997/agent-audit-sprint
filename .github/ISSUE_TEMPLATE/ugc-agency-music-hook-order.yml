name: Buy UGC agency music hook
description: Short buying-intent form for UGC agency and paid-social client approval audio hooks
title: "UGC agency music hook order: <agency or client project>"
labels: ["ai-jingle-order", "ugc-agency-music-hook-order"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a paid AI-assisted UGC agency audio hook sketch or agency ad music pack. Do not paste private client data, unreleased customer data, credentials, or third-party lyrics you do not have rights to use.
  - type: dropdown
    id: package
    attributes:
      label: Requested package
      description: Pick the smallest package that answers the current client approval need.
      options:
        - USD $29 UGC Agency Audio Hook Sketch
        - USD $79 Jingle Hook Pack
        - USD $149 Agency Ad Music Pack
        - USD $399 Sonic Launch Kit
    validations:
      required: true
  - type: input
    id: project
    attributes:
      label: Agency or client project
      placeholder: Launch Reel Client Test
    validations:
      required: true
  - type: input
    id: website
    attributes:
      label: Website, store, or creative brief link
      placeholder: https://example.com
  - type: dropdown
    id: usage
    attributes:
      label: Primary use
      options:
        - Client approval audio hook
        - 6-10s TikTok UGC ad opener
        - 15s Reels ad concept
        - Product demo bed
        - 15/30/60s paid-social cut plan
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Publishing channel
      options:
        - Client approval only
        - TikTok paid social
        - Instagram Reels paid social
        - YouTube Shorts paid social
        - Multi-platform paid social
    validations:
      required: true
  - type: dropdown
    id: source_rights
    attributes:
      label: Source material rights
      options:
        - Original prompt only; no third-party lyrics or melodies
        - Agency-owned tagline only
        - Client-owned tagline only
        - Cleared client-owned voiceover or video reference
        - Needs rights review before generation
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Target viewer and offer
      description: Summarize the buyer, product, offer, and client approval context without private client data.
      placeholder: Ecommerce skincare buyers seeing a creator-led product demo and launch-week offer.
    validations:
      required: true
  - type: input
    id: cta
    attributes:
      label: Required line or CTA
      placeholder: Three steps, one brighter routine.
  - type: dropdown
    id: pacing
    attributes:
      label: Visual pacing
      options:
        - Creator talking-head
        - Product demo
        - Before-after
        - Testimonial
        - Launch reel
        - Other paid-social cut
    validations:
      required: true
  - type: dropdown
    id: approval_need
    attributes:
      label: Client approval need
      options:
        - One direction
        - Three directions
        - 15/30/60s cut plan
        - Needs scope discussion
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email, GitHub handle, or "reply in this issue".
      placeholder: reply in this issue
    validations:
      required: true
  - type: dropdown
    id: timing
    attributes:
      label: Timing
      options:
        - 24h if available
        - 48h target
        - This week
        - Date to discuss
    validations:
      required: true
  - type: dropdown
    id: payment
    attributes:
      label: Payment path
      description: Payment is requested only after the brief is accepted in writing.
      options:
        - Ethereum ETH after brief acceptance
        - Ethereum ERC-20 USDC/USDT/DAI after brief acceptance
        - Solana SOL after brief acceptance
        - Solana SPL USDC after brief acceptance
        - Need invoice/discussion first
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I will not include secrets, credentials, private client data, unreleased customer data, or third-party lyrics I do not have rights to use.
          required: true
        - label: I understand AI-generated music may have copyright-registration limits, and this package is not legal clearance.
          required: true
        - label: I understand payment is only requested after written brief acceptance for the selected package.
          required: true
