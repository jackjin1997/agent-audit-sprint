name: Buy audit package
description: Short buying-intent form for $99, $299, or $1,000 Agent/MCP security review work
title: "Audit package: <project name>"
labels: ["audit-intent"]
body:
  - type: markdown
    attributes:
      value: |
        Use this shorter form when you want a paid Agent/MCP security review without writing a full scope first. Do not paste secrets, private keys, cookies, customer data, or production logs with sensitive values.
  - type: dropdown
    id: package
    attributes:
      label: Requested package
      description: Pick the smallest package that answers the current decision.
      options:
        - USD $99 Quick Scan Report
        - USD $299 Same-day Focused Review
        - USD $299 MCP SSRF Focused Review
        - USD $1,000 Full Audit Sprint
    validations:
      required: true
  - type: input
    id: project
    attributes:
      label: Project or repo URL
      description: Public repo, docs, package, demo, or product URL.
      placeholder: https://github.com/org/repo
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email, GitHub handle, or "reply in this issue".
      placeholder: reply in this issue
    validations:
      required: true
  - type: dropdown
    id: timing
    attributes:
      label: Timing
      description: When do you want the review to start after scope/payment confirmation?
      options:
        - Same day if available
        - 48h target
        - This week
        - Date to discuss
    validations:
      required: true
  - type: dropdown
    id: payment
    attributes:
      label: Payment path
      description: Choose network and asset if ready, or invoice/discussion first if billing details need to be agreed before payment.
      options:
        - Ethereum ETH after scope acceptance
        - Ethereum ERC-20 USDC/USDT/DAI after scope acceptance
        - Solana SOL after scope acceptance
        - Solana SPL USDC after scope acceptance
        - Need invoice/discussion first
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: One-line concern
      description: Optional short reason this audit is useful.
      placeholder: Remote MCP launch, write-capable tools, workspace data, trading actions, database access, browser automation...
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I will not include secrets, credentials, cookies, private keys, or sensitive customer data in this issue.
          required: true
        - label: I understand payment is only requested after written scope acceptance for the selected package.
          required: true
