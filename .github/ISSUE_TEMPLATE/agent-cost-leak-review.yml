name: AI Agent cost leak review
description: Buy a USD $299 focused review for one AI agent token spend, model routing, RAG, retry, cache, or tool-loop cost leak
title: "AI agent cost review: <project name>"
labels: ["audit-intent", "agent-cost-leak-review"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for the USD $299 AI Agent Cost Leak Review. Do not paste secrets, private prompts, API keys, customer data, proprietary logs, production traces with sensitive values, or billing screenshots with private account details.
  - type: dropdown
    id: package
    attributes:
      label: Requested package
      description: This form is for one focused AI agent cost boundary review.
      options:
        - USD $299 AI Agent Cost Leak Review
    validations:
      required: true
  - type: input
    id: project
    attributes:
      label: Project, repo, product, or workflow URL
      description: Public repo, docs, demo, calculator snapshot, sanitized trace summary, or product URL.
      placeholder: https://github.com/org/repo
    validations:
      required: true
  - type: dropdown
    id: cost-boundary
    attributes:
      label: Cost boundary
      description: Pick the closest expensive path for this focused review.
      options:
        - Coding agent loop / repeated tool calls
        - RAG or search context bloat
        - Chat workflow / support bot token spend
        - Model routing / frontier model overuse
        - Retry storm / failed tool-call loop
        - Cache miss / prompt churn
        - Batch or background job LLM spend
        - Other AI agent cost leak
    validations:
      required: true
  - type: textarea
    id: usage-evidence
    attributes:
      label: Sanitized usage evidence
      description: Summarize request counts, model mix, token totals, retry counts, prompt/context size, or billing shape. Keep it sanitized.
      placeholder: 2,400 agent runs/week, 6-10 tool calls/run, long RAG context, expensive model used for every retry; no private prompts or account data included.
    validations:
      required: true
  - type: textarea
    id: highest-risk
    attributes:
      label: Highest cost question
      description: What decision should this review help you make?
      placeholder: Whether prompt trimming, cache reuse, model routing, loop caps, or RAG limits can cut spend before launch.
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email, GitHub handle, or "reply in this issue".
      placeholder: reply in this issue
    validations:
      required: true
  - type: dropdown
    id: timing
    attributes:
      label: Timing
      description: When do you want the review to start after scope/payment confirmation?
      options:
        - Same day if available
        - 48h target
        - This week
        - Date to discuss
    validations:
      required: true
  - type: dropdown
    id: payment
    attributes:
      label: Payment path
      description: Choose network and asset if ready, or invoice/discussion first if billing details need to be agreed before payment.
      options:
        - Ethereum ETH after scope acceptance
        - Ethereum ERC-20 USDC/USDT/DAI after scope acceptance
        - Solana SOL after scope acceptance
        - Solana SPL USDC after scope acceptance
        - Need invoice/discussion first
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I will not include secrets, private prompts, API keys, customer data, proprietary logs, production traces with sensitive values, or billing account details in this issue.
          required: true
        - label: I understand payment is only requested after written scope acceptance for the selected package.
          required: true
