name: Payment confirmation
description: Submit transaction evidence after an audit scope, focused review, or AI music brief is accepted
title: "Payment proof: <project or brand name>"
labels: ["payment-proof"]
body:
  - type: markdown
    attributes:
      value: |
        Use this only after the audit scope, focused review, or AI music brief is accepted in writing. Do not paste private keys, seed phrases, exchange account screenshots, or unrelated sensitive data.
  - type: input
    id: scope_issue
    attributes:
      label: Accepted scope issue URL
      description: Link the audit request, focused review, AI music order, or email-to-issue trail where scope/brief was accepted.
      placeholder: https://github.com/jackjin1997/agent-audit-sprint/issues/123
    validations:
      required: true
  - type: dropdown
    id: accepted_service
    attributes:
      label: Accepted package or service
      description: Select the package that was accepted before payment. If the written agreement differs, choose the final option and explain it in payer details.
      options:
        - USD $29 AI short-form or UGC hook sketch
        - USD $79 AI jingle hook pack
        - USD $149 AI ad music or agency pack
        - USD $399 Sonic Launch Kit
        - USD $99 Quick Scan Report
        - USD $299 Agent Auth / MCP SSRF / focused review
        - USD $1,000 Full Agent/MCP Audit Sprint
        - Other accepted written scope
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Payment network
      options:
        - Ethereum ETH
        - Ethereum ERC-20 USDC/USDT/DAI
        - Solana SOL
        - Solana SPL USDC
        - Invoice or other agreed path
    validations:
      required: true
  - type: input
    id: transaction_hash
    attributes:
      label: Transaction hash or settlement reference
      description: Native-chain transaction hash, or invoice settlement reference if an invoice-first path was agreed.
      placeholder: tx hash / signature / invoice reference
    validations:
      required: true
  - type: input
    id: evidence_url
    attributes:
      label: Explorer or invoice URL
      description: Optional block explorer URL, Solana explorer URL, or invoice settlement URL that matches the transaction/reference above.
      placeholder: https://etherscan.io/tx/... or https://solscan.io/tx/...
  - type: input
    id: amount
    attributes:
      label: Amount sent
      description: Include unit, network, and asset, for example "149 USDC on Ethereum", "399 USDC on Solana", "1,000 USDC on Ethereum", "0.42 ETH", "6.8 SOL", or "USD 149".
      placeholder: USD package amount equivalent, asset, and network
    validations:
      required: true
  - type: textarea
    id: payer
    attributes:
      label: Payer details
      description: Optional payer wallet address, billing name, or invoice reference. Do not include secrets.
      placeholder: Wallet address or invoice entity, if useful.
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: Scope or brief was accepted before this payment was sent.
          required: true
        - label: I did not include private keys, seed phrases, cookies, credentials, or unrelated sensitive data.
          required: true
