name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx playwright install chromium
      - run: npm run check
      - run: npm --silent run audit:repo -- . --json > audit.json
      - run: node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('audit.json','utf8')); if (!r.score || !Array.isArray(r.findings)) process.exit(1); console.log('score=' + r.score + ' findings=' + r.findings.length);"
      - run: npm --silent run audit:repo -- . --sarif > audit.sarif
      - run: node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('audit.sarif','utf8')); const run=r.runs&&r.runs[0]; if (r.version!=='2.1.0'||!run?.tool?.driver?.rules?.length||!Array.isArray(run.results)) process.exit(1); console.log('sarif-results=' + run.results.length);"
