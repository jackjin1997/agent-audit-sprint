name: Buy AI jingle package
description: Short buying-intent form for AI-assisted jingles, ad music, and podcast intro audio
title: "AI jingle order: <brand or show name>"
labels: ["ai-jingle-order"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a paid AI-assisted jingle, podcast intro, radio ID, or ad music package. Do not paste private campaign data, unreleased customer data, credentials, or third-party lyrics you do not have rights to use.
  - type: dropdown
    id: package
    attributes:
      label: Requested package
      description: Pick the smallest package that answers the current campaign need.
      options:
        - USD $79 Jingle Hook Pack
        - USD $149 Ad Music Pack
        - USD $399 Sonic Launch Kit
    validations:
      required: true
  - type: input
    id: brand
    attributes:
      label: Brand, podcast, channel, or product name
      placeholder: Bean There Coffee
    validations:
      required: true
  - type: input
    id: website
    attributes:
      label: Website or social link
      placeholder: https://example.com
  - type: dropdown
    id: usage
    attributes:
      label: Primary use
      options:
        - 15 second social ad
        - 30 second ad cut
        - 60 second ad cut
        - Podcast intro or outro
        - Radio ID or DJ drop
        - YouTube intro
        - Other short branded audio
    validations:
      required: true
  - type: textarea
    id: brief
    attributes:
      label: Brand brief
      description: Audience, product, offer, mood, and any required tagline.
      placeholder: Upbeat local coffee shop jingle for morning commuters. Include "Wake up with us" if it fits naturally.
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email, GitHub handle, or "reply in this issue".
      placeholder: reply in this issue
    validations:
      required: true
  - type: dropdown
    id: timing
    attributes:
      label: Timing
      options:
        - 24h if available
        - 48h target
        - This week
        - Date to discuss
    validations:
      required: true
  - type: dropdown
    id: payment
    attributes:
      label: Payment path
      description: Payment is requested only after the brief is accepted in writing.
      options:
        - Ethereum ETH after brief acceptance
        - Ethereum ERC-20 USDC/USDT/DAI after brief acceptance
        - Solana SOL after brief acceptance
        - Solana SPL USDC after brief acceptance
        - Need invoice/discussion first
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I will not include secrets, credentials, private campaign data, unreleased customer data, or third-party lyrics I do not have rights to use.
          required: true
        - label: I understand AI-generated music may have copyright-registration limits, and this package is not legal clearance.
          required: true
        - label: I understand payment is only requested after written brief acceptance for the selected package.
          required: true
